server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;

    # Nunca convertir redirecciones a absolutas (preserva el puerto del navegador).
    absolute_redirect off;

    # La raíz sirve la Tienda directamente (sin redirección).
    # El archivo se llama "Variedades Dianery.html" (con espacio).
    location = / {
        try_files "/Variedades Dianery.html" =404;
    }

    # Servir archivos tal cual (incluye .jsx, .css, imágenes).
    location / {
        autoindex off;
        try_files $uri $uri/ =404;
    }

    # No cachear durante el desarrollo, para ver cambios al recargar.
    location ~* \.(html|jsx|js|css)$ {
        add_header Cache-Control "no-store";
    }
}
