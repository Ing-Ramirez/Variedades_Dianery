name: Deploy a Hostinger

# Despliegue por SSH (rsync, puerto 65002). SSH evita el bloqueo de fail2ban del
# FTP (puerto 21). Requiere secrets: SSH_PRIVATE_KEY, SSH_HOST, SSH_USER,
# SSH_PORT, SSH_TARGET, SSH_KNOWN_HOSTS. La clave publica debe estar en authorized_keys de Hostinger.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Preparar archivos para producción
        run: |
          mkdir -p deploy/admin deploy/components deploy/uploads
          cp index.html index.php og-image.php sitemap.php robots.txt app.jsx config.js dianery-data.js footer.css styles.css tweaks-panel.jsx favicon.svg api.php db.php hit.php img.php upload.php migrate-images.php deploy/
          cp -r admin/. deploy/admin/
          cp -r components/. deploy/components/
          [ -d uploads ] && cp -r uploads/. deploy/uploads/ || true
          cp .htaccess deploy/ 2>/dev/null || true
          # Cache-busting: __VER__ → SHA corto del commit.
          VER="${GITHUB_SHA::8}"
          sed -i "s/__VER__/$VER/g" deploy/index.html deploy/admin/Admin.html
          echo "Versión de assets: $VER"

      - name: Precompilar JSX a JS (sin Babel en el navegador)
        run: |
          # Instala el MISMO Babel que el navegador usa en dev por CDN (7.29.0)
          # para que dev (jsx+babel) y prod (js precompilado) sean idénticos.
          npm i @babel/standalone@7.29.0 --no-save --no-audit --no-fund
          # Transpila los .jsx de deploy/ a .js y elimina los .jsx de la salida.
          node tools/precompile.js deploy
          # Reescribe los HTML: quita el <script> de Babel y cambia
          #   type="text/babel" src="X.jsx?v=..."  ->  src="X.js?v=..."
          sed -i \
            -e '/babel\/standalone/d' \
            -e 's#type="text/babel" src="\([^"]*\)\.jsx\([^"]*\)"#src="\1.js\2"#g' \
            deploy/index.html deploy/admin/Admin.html
          # Verificación: no debe quedar ningún .jsx ni referencia a Babel.
          if find deploy -name '*.jsx' | grep -q .; then
            echo "❌ Quedaron .jsx sin transpilar"; find deploy -name '*.jsx'; exit 1
          fi
          if grep -rq 'text/babel' deploy/index.html deploy/admin/Admin.html; then
            echo "❌ Quedó type=text/babel en el HTML"; exit 1
          fi
          echo "✅ Precompilación completada (sin Babel, solo .js)"

      - name: Configurar clave SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ -z "${{ secrets.SSH_KNOWN_HOSTS }}" ]; then
            echo "Falta configurar el secret SSH_KNOWN_HOSTS"; exit 1
          fi
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Subir con rsync por SSH
        run: |
          # Sin --delete (seguro) y excluyendo data.json para NO tocar los datos del servidor.
          # 3 reintentos para tolerar caídas transitorias de la conexión SSH.
          SSHOPT="ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts -o ConnectTimeout=20 -o ServerAliveInterval=10"
          DEST="${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_TARGET }}"
          n=0
          until [ "$n" -ge 3 ]; do
            if rsync -rlptz --timeout=90 --exclude='data.json' --exclude='*.tmp' -e "$SSHOPT" deploy/ "$DEST"; then
              echo "✅ Despliegue por SSH completado"; exit 0
            fi
            n=$((n+1)); echo "⚠️ Intento $n falló; reintentando en 15s…"; sleep 15
          done
          echo "❌ rsync falló tras 3 intentos"; exit 1
