name: Deploy a Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Preparar archivos para producción
        run: |
          mkdir -p deploy/admin deploy/components deploy/uploads
          cp "Variedades Dianery.html" deploy/index.html
          cp app.jsx config.js dianery-data.js footer.css styles.css tweaks-panel.jsx deploy/
          cp -r admin/. deploy/admin/
          cp -r components/. deploy/components/
          [ -d uploads ] && cp -r uploads/. deploy/uploads/ || true
          echo "=== Estructura de deploy ===" && find deploy -type f | sort

      - name: Subir a Hostinger vía FTP (curl)
        shell: bash
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          # El FTP de Hostinger está enjaulado (chroot) DENTRO de public_html:
          # se sube a la raíz "/", no a "public_html/".
          HOST="${FTP_HOST#ftp://}"   # quita prefijo ftp:// si lo tuviera
          HOST="${HOST%/}"            # quita barra final
          COMMON="--disable-epsv --ftp-pasv --connect-timeout 30 --retry 3 --retry-delay 3 --user $FTP_USER:$FTP_PASS"
          fail=0
          while IFS= read -r f; do
            rel="${f#deploy/}"
            name="$(basename "$rel")"
            if [ "$name" = "Dashboard.jsx" ]; then
              # Hostinger bloquea subir un archivo llamado Dashboard.jsx (regla de seguridad).
              # Se sube con nombre temporal y se renombra en el servidor.
              tmp="${rel%Dashboard.jsx}__dash_tmp.jsx"
              curl -sS $COMMON --ftp-create-dirs -T "$f" "ftp://$HOST/$tmp" || fail=1
              curl -sS $COMMON "ftp://$HOST/" -Q "DELE $rel" >/dev/null 2>&1 || true
              curl -sS $COMMON "ftp://$HOST/" -Q "RNFR $tmp" -Q "RNTO $rel" || fail=1
            else
              curl -sS $COMMON --ftp-create-dirs -T "$f" "ftp://$HOST/$rel" || fail=1
            fi
            echo "→ $rel"
          done < <(find deploy -type f | sort)
          if [ "$fail" -ne 0 ]; then echo "❌ Hubo fallos en la subida"; exit 1; fi
          echo "✅ Todos los archivos subidos"
