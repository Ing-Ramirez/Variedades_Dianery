name: Deploy a Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Preparar archivos para producción
        run: |
          mkdir -p deploy/admin deploy/components deploy/uploads
          # Renombrar el HTML principal a index.html
          cp "Variedades Dianery.html" deploy/index.html
          # Archivos raíz
          cp app.jsx config.js dianery-data.js footer.css styles.css tweaks-panel.jsx deploy/
          # Subcarpetas explícitas para garantizar que FTP las sube
          cp -r admin/. deploy/admin/
          cp -r components/. deploy/components/
          [ -d uploads ] && cp -r uploads/. deploy/uploads/ || true
          # Verificar que todo está listo
          echo "=== Estructura de deploy ===" && find deploy -type f | sort

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Subir a Hostinger vía FTP (lftp recursivo)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" \
            -e "set ssl:verify-certificate no; set ftp:passive-mode yes; mirror --reverse --delete --verbose deploy/ public_html/; bye"
