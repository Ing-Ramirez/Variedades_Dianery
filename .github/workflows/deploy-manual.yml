name: Despliegue Hostinger (manual)

on:
  workflow_dispatch:
    inputs:
      mensaje:
        description: 'Motivo del despliegue manual'
        required: false
        default: 'Despliegue bajo demanda'

jobs:
  deploy-manual:
    name: Deploy manual a Hostinger
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Mostrar motivo
        run: echo "🚀 Deploy manual — ${{ github.event.inputs.mensaje }}"

      - name: Preparar archivos
        run: |
          mkdir -p deploy
          cp "Variedades Dianery.html" deploy/index.html
          cp app.jsx config.js dianery-data.js footer.css styles.css tweaks-panel.jsx deploy/
          cp -r admin components uploads deploy/

      - name: Subir a Hostinger vía FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: 21
          local-dir: deploy/
          server-dir: public_html/
          dangerous-clean-slate: false

      - name: Confirmar deploy
        run: echo "✅ Despliegue manual completado — $(date '+%Y-%m-%d %H:%M:%S UTC')"
